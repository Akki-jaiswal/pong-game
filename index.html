<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Pong Game</title>
    <link rel="icon" href="pong.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeScreen" class="welcome-screen">
        <h2>Welcome to Pong!</h2>
        <input type="text" id="playerNameInput" placeholder="Enter your name (optional)" maxlength="15">
        <button id="startGameButton">Play Game</button>
    </div>

    <div id="gameOverScreen" class="game-over-overlay">
  <div class="game-over-content">
    <svg width="64" height="64" fill="none" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="30" fill="#262e60"/>
      <path d="M32 12v24" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="32" cy="44" r="3.5" fill="#fffc6c" stroke="#fff" stroke-width="2"/>
    </svg>
    <h1 id="gameOverMessage"></h1>
    <div class="score-summary">
      <p id="finalPlayerScore"></p>
      <p id="finalAiScore"></p>
    </div>
    <button class="play-again-btn" id="playAgainButton">Play Again</button>
    <button class="main-menu-btn" onclick="showWelcomeScreen()">Main Menu</button>
  </div>
</div>


    <h1>Pong Game</h1>
    <div class="game-controls">
        <button id="pauseButton">Pause</button>
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>
        <div class="score">
            <span id="playerScore">Player: 0</span> | <span id="aiScore">AI: 0</span>
        </div>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script type="module" src="script.js"></script>
</body>
</html>
